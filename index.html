<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Flip Clock Pro - Size Corrected</title>
    <style>
        /* --- CONFIGURACIÓN Y VARIABLES --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #1c1c1e, #111112);
            --text-color: #ffffff;
            --flip-bg: #2c2c2e;
            --flip-text: #ffffff;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            --shadow-color: rgba(0, 0, 0, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnim 20s ease infinite;
            color: var(--text-color);
            overflow: hidden;
            transition: background 0.8s ease, color 0.5s ease;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .clock-container {
            text-align: center;
            cursor: pointer;
            padding: 2rem;
            user-select: none;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.8;
            margin-bottom: 2.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* --- CONTENEDORES FLIP CALIBRADOS --- */
        .flip-clock {
            display: flex;
            gap: 24px;
            justify-content: center;
            align-items: center;
        }

        .flip-group {
            display: flex;
            gap: 6px;
        }

        /* Caja contenedora: Relación de aspecto Apple estándar */
        .flip-card {
            position: relative;
            width: 120px;
            height: 160px;
            perspective: 500px;
            box-shadow: 0 15px 35px var(--shadow-color);
            border-radius: 18px;
        }

        /* Paneles con overflow oculto para hacer el corte */
        .card-panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: var(--flip-bg);
            border: 1px solid var(--card-border);
        }

        /* Configuración base del texto: ¡Ahora sí con tamaño completo! */
        .card-panel span, .flipper-falling span {
            position: absolute;
            left: 0;
            width: 100%;
            height: 160px; /* Misma altura que la tarjeta completa */
            line-height: 160px; /* Centrado vertical nativo */
            text-align: center;
            font-size: 7.5rem; /* Tamaño premium grande sin cortes laterales */
            font-weight: 700;
            color: var(--flip-text);
        }

        /* Mitad superior: Muestra los 80px de arriba */
        .card-top {
            top: 0;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            border-bottom: none;
            background: linear-gradient(to bottom, var(--flip-bg), #1e1e20);
        }

        .card-top span {
            top: 0;
        }

        /* Mitad inferior: Muestra los 80px de abajo desplazando el texto de forma exacta */
        .card-bottom {
            bottom: 0;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            border-top: none;
            background: linear-gradient(to top, var(--flip-bg), #242426);
        }

        .card-bottom span {
            top: -80px; /* Sube el texto exactamente la mitad del contenedor para revelar el fondo */
        }

        /* Línea de pliegue central */
        .flip-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: calc(50% - 1px);
            width: 100%;
            height: 2px;
            background: rgba(0, 0, 0, 0.6);
            z-index: 40;
            box-shadow: 0 1px 0px rgba(255,255,255,0.08);
        }

        /* Pestaña voladora corregida con la misma física de desplazamiento */
        .flipper-falling {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 50%;
            background: var(--flip-bg);
            border: 1px solid var(--card-border);
            border-bottom: none;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            overflow: hidden;
            transform-origin: bottom center;
            animation: flipDown 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 30;
            backface-visibility: hidden;
        }

        .flipper-falling span {
            top: 0;
        }

        @keyframes flipDown {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-180deg); }
        }

        /* Separadores (:) */
        .colon {
            font-size: 4.5rem;
            font-weight: 300;
            opacity: 0.6;
            animation: blink 1s infinite;
            align-self: center;
            margin: 0 -4px;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        .ampm-badge {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-top: 2.5rem;
            text-transform: uppercase;
        }

        /* --- PANEL DE CONFIGURACIÓN --- */
        .settings-panel {
            position: fixed;
            right: -380px;
            top: 20px;
            bottom: 20px;
            width: 350px;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: -10px 0 40px rgba(0,0,0,0.4);
            color: #fff;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1000;
            overflow-y: auto;
        }

        .settings-panel.open { right: 20px; }
        .settings-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
        .settings-header h3 { font-weight: 600; font-size: 1.1rem; }
        .close-btn { cursor: pointer; opacity: 0.6; font-size: 0.9rem;}
        .close-btn:hover { opacity: 1; }
        .section-title { font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; }

        input[type="checkbox"] {
            appearance: none; width: 46px; height: 26px; background: rgba(255,255,255,0.2); border-radius: 13px; position: relative; cursor: pointer; transition: background 0.3s;
        }
        input[type="checkbox"]:checked { background: #34c759; }
        input[type="checkbox"]::before {
            content: ''; position: absolute; width: 22px; height: 22px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: transform 0.3s;
        }
        input[type="checkbox"]:checked::before { transform: translateX(20px); }

        .themes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; }
        .theme-card { background: rgba(255,255,255,0.06); padding: 12px; border-radius: 10px; font-size: 0.75rem; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .theme-card:hover { transform: translateY(-1px); background: rgba(255,255,255,0.15); }
        
        .hint-toast { position: fixed; bottom: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; opacity: 0.7; pointer-events: none; transition: opacity 0.5s; z-index: 999; }

        @media (max-width: 680px) {
            .flip-card { width: 60px; height: 80px; }
            .card-panel span, .flipper-falling span { height: 80px; line-height: 80px; font-size: 3.8rem; }
            .card-bottom span { top: -40px; }
            .colon { font-size: 2.2rem; }
            .flip-clock { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="clock-container" onclick="togglePanel()">
        <div class="date" id="date">--</div>
        
        <div class="flip-clock">
            <div class="flip-group">
                <div class="flip-card" id="h1"><div class="card-panel card-top"><span>0</span></div><div class="card-panel card-bottom"><span>0</span></div></div>
                <div class="flip-card" id="h2"><div class="card-panel card-top"><span>0</span></div><div class="card-panel card-bottom"><span>0</span></div></div>
            </div>
            
            <div class="colon">:</div>

            <div class="flip-group">
                <div class="flip-card" id="m1"><div class="card-panel card-top"><span>0</span></div><div class="card-panel card-bottom"><span>0</span></div></div>
                <div class="flip-card" id="m2"><div class="card-panel card-top"><span>0</span></div><div class="card-panel card-bottom"><span>0</span></div></div>
            </div>

            <div class="colon" id="colon-sec" style="display:none;">:</div>

            <div class="flip-group" id="sec-group" style="display:none;">
                <div class="flip-card" id="s1"><div class="card-panel card-top"><span>0</span></div><div class="card-panel card-bottom"><span>0</span></div></div>
                <div class="flip-card" id="s2"><div class="card-panel card-top"><span>0</span></div><div class="card-panel card-bottom"><span>0</span></div></div>
            </div>
        </div>

        <div class="ampm-badge" id="ampm">--</div>
    </div>

    <div class="hint-toast" id="hint">Presiona [ . ] para abrir Ajustes</div>

    <div class="settings-panel" id="settings">
        <div class="settings-header">
            <h3>Diseño Apple Retro</h3>
            <span class="close-btn" onclick="togglePanel()">Listo</span>
        </div>

        <div>
            <div class="section-title">Opciones</div>
            <div class="setting-row">
                <span>Mostrar Segundos</span>
                <input type="checkbox" id="show-seconds" onchange="applySettings()">
            </div>
        </div>

        <div>
            <div class="section-title">Temas Clásicos y Modernos</div>
            <div class="themes-grid" id="themes-box"></div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE TEMAS ---
        const flipThemes = [
            { name: "🍎 Clásico Mac Saver", bg: "linear-gradient(135deg, #1c1c1e, #111112)", card: "#2c2c2e", text: "#ffffff", pageText: "#ffffff" },
            { name: "✨ macOS Sonoma", bg: "linear-gradient(135deg, #c3a4f3, #ecb4bb, #9bc4eb)", card: "rgba(255,255,255,0.85)", text: "#1c1c1e", pageText: "#ffffff" },
            { name: "⌚ watchOS Ultra Neon", bg: "linear-gradient(135deg, #000000, #0a0a0a)", card: "#111111", text: "#ff453a", pageText: "#ff453a" },
            { name: "🍊 Hermès Special", bg: "linear-gradient(135deg, #111, #222)", card: "#ff9500", text: "#000000", pageText: "#ff9500" },
            { name: "🧊 Glass Minimal", bg: "linear-gradient(135deg, #e5e5ea, #d1d1d6)", card: "#ffffff", text: "#1d1d1f", pageText: "#1d1d1f" },
            { name: "🌌 iOS Aurora", bg: "linear-gradient(135deg, #0f172a, #2e1065)", card: "rgba(255,255,255,0.15)", text: "#ffffff", pageText: "#f4f4f5" },
            { name: "🎨 Apple Arcade", bg: "linear-gradient(135deg, #ff2d55, #ff9500)", card: "#ffffff", text: "#ff2d55", pageText: "#ffffff" },
            { name: "🏁 Stealth Dark", bg: "linear-gradient(135deg, #000000, #050505)", card: "#0a0a0a", text: "rgba(255,255,255,0.3)", pageText: "rgba(255,255,255,0.5)" }
        ];

        // Generar Temas
        const themesBox = document.getElementById('themes-box');
        flipThemes.forEach((theme, idx) => {
            const card = document.createElement('div');
            card.className = 'theme-card';
            card.innerText = theme.name;
            card.style.background = theme.bg;
            card.style.color = theme.pageText;
            card.onclick = (e) => { e.stopPropagation(); setTheme(idx); };
            themesBox.appendChild(card);
        });

        window.addEventListener('keydown', (e) => { if (e.key === '.') togglePanel(); });
        function togglePanel() { document.getElementById('settings').classList.toggle('open'); document.getElementById('hint').style.opacity = '0'; }

        function setTheme(idx) {
            const t = flipThemes[idx];
            document.documentElement.style.setProperty('--bg-gradient', t.bg);
            document.documentElement.style.setProperty('--flip-bg', t.card);
            document.documentElement.style.setProperty('--flip-text', t.text);
            document.documentElement.style.setProperty('--text-color', t.pageText);
        }

        function applySettings() {
            const showSecs = document.getElementById('show-seconds').checked;
            document.getElementById('sec-group').style.display = showSecs ? 'flex' : 'none';
            document.getElementById('colon-sec').style.display = showSecs ? 'block' : 'none';
        }

        // --- SISTEMA DE CORRECCIÓN DE POSICIÓN ---
        function updateCardIfNeeded(cardId, newValue) {
            const card = document.getElementById(cardId);
            const topSpan = card.querySelector('.card-top span');
            const bottomSpan = card.querySelector('.card-bottom span');
            
            if (topSpan.textContent === newValue) return;

            const oldValue = topSpan.textContent;

            // 1. Cambiamos el fondo estático inferior inmediatamente
            bottomSpan.textContent = newValue;

            // 2. Desplegamos la pestaña que rota con el número anterior
            const flipper = document.createElement('div');
            flipper.className = 'flipper-falling';
            flipper.innerHTML = `<span>${oldValue}</span>`;
            card.appendChild(flipper);

            // 3. Cambiamos el fondo estático superior inmediatamente
            topSpan.textContent = newValue;
            
            flipper.addEventListener('animationend', () => {
                flipper.remove();
            });
        }

        function updateClock() {
            const now = new Date();
            
            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', dateOptions).toUpperCase();

            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;

            const hStr = String(hours).padStart(2, '0');
            const mStr = String(now.getMinutes()).padStart(2, '0');
            const sStr = String(now.getSeconds()).padStart(2, '0');

            updateCardIfNeeded('h1', hStr[0]);
            updateCardIfNeeded('h2', hStr[1]);
            updateCardIfNeeded('m1', mStr[0]);
            updateCardIfNeeded('m2', mStr[1]);
            updateCardIfNeeded('s1', sStr[0]);
            updateCardIfNeeded('s2', sStr[1]);

            document.getElementById('ampm').textContent = ampm;
        }

        setInterval(updateClock, 200);
        updateClock();
        
        setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);
    </script>
</body>
</html>
